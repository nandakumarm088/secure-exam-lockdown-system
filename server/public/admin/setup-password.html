<!DOCTYPE html>
<html lang="en">
<head>
  <title>Set Password</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="setup-password.css">
</head>
<body>
<div id="container" style="display:none;">
  <h2>Set Your Password</h2>
  <form id="setPasswordForm" autocomplete="off" novalidate>
    <div class="input-group">
      <label for="newPassword">New password</label>
      <input type="password" id="newPassword" required minlength="8" autocomplete="new-password" />
      <button class="toggle-pw" type="button" tabindex="0" aria-label="Show/hide password" id="toggleNewPw" aria-pressed="false">
        <!-- Eye (open) -->
        <svg class="eye" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
          <path d="M1 12s4.818-7 11-7 11 7 11 7-4.818 7-11 7S1 12 1 12Z" stroke="currentColor" stroke-width="2"/>
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
        </svg>
        <!-- Eye-off (with line) -->
        <svg class="eye-off" xmlns="http://www.w3.org/2000/svg"  viewBox="0 0 24 24" fill="none">
          <path d="M1 12s4.818-7 11-7c2.319 0 4.454.687 6.352 1.805m3.338 2.452A20.67 20.67 0 0123 12s-4.818 7-11 7a13.08 13.08 0 01-5.132-1.021m-3.932-2.6A20.863 20.863 0 011 12m0 0c1.964-3.378 6.872-7 11-7m-7.831 9.379A15.918 15.918 0 0012 19c4.107 0 9.014-3.622 10.971-7m-10.97 0c-1.657 0-3-1.343-3-3m7.416 4.509a3.001 3.001 0 01-3.87-3.87m3.87 3.87L21 21" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
    </div>
    <div class="input-group">
      <label for="confirmPassword">Confirm password</label>
      <input type="password" id="confirmPassword" required minlength="8" autocomplete="new-password" />
      <button class="toggle-pw" type="button" tabindex="0" aria-label="Show/hide password" id="toggleConfirmPw" aria-pressed="false">
        <svg class="eye" xmlns="http://www.w3.org/2000/svg"  viewBox="0 0 24 24" fill="none">
          <path d="M1 12s4.818-7 11-7 11 7 11 7-4.818 7-11 7S1 12 1 12Z" stroke="currentColor" stroke-width="2"/>
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
        </svg>
        <svg class="eye-off" xmlns="http://www.w3.org/2000/svg"  viewBox="0 0 24 24" fill="none">
          <path d="M1 12s4.818-7 11-7c2.319 0 4.454.687 6.352 1.805m3.338 2.452A20.67 20.67 0 0123 12s-4.818 7-11 7a13.08 13.08 0 01-5.132-1.021m-3.932-2.6A20.863 20.863 0 011 12m0 0c1.964-3.378 6.872-7 11-7m-7.831 9.379A15.918 15.918 0 0012 19c4.107 0 9.014-3.622 10.971-7m-10.97 0c-1.657 0-3-1.343-3-3m7.416 4.509a3.001 3.001 0 01-3.87-3.87m3.87 3.87L21 21" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
    </div>
    <button type="submit">Set Password</button>
  </form>
  <div id="status"></div>
</div>
<script src="setup-password.js"></script>
</body>
</html>
